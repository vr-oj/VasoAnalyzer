name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # PyQt5 needs these system libs on Ubuntu even when installed via pip.
      # libgl1-mesa-glx and libegl1-mesa were renamed in Ubuntu 22.04+.
      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libegl1 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          # Use Qt's built-in offscreen renderer — no display required
          QT_QPA_PLATFORM: offscreen
        run: pytest
