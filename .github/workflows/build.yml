name: Build

# Triggered when you push a version tag, e.g.: git tag v3.1.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── macOS (Intel + Apple Silicon) ────────────────────────────────────────
  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15
            label: AppleSilicon
          - runner: macos-15-intel
            label: Intel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Inject version from tag
        run: |
          sed -i '' 's/^APP_VERSION = .*/APP_VERSION = "${{ github.ref_name }}"/' src/utils/config.py

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Build macOS DMG
        run: bash packaging/macos/build_macos.sh
        env:
          ARCH_LABEL: ${{ matrix.label }}

      - name: Smoke-test macOS app
        run: |
          APP=$(find dist -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP" ]; then echo "No .app found in dist/"; exit 1; fi
          EXE="$APP/Contents/MacOS/$(ls "$APP/Contents/MacOS/" | head -1)"
          echo "==> Running smoke test: $EXE"
          "$EXE" --smoke-test
          echo "==> Smoke test passed"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.label }}
          path: packaging/macos/output/*.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Inject version from tag
        shell: pwsh
        run: |
          (Get-Content src/utils/config.py) `
            -replace '^APP_VERSION = .*', "APP_VERSION = `"${{ github.ref_name }}`"" |
            Set-Content src/utils/config.py

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Inject version into Inno Setup script
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content packaging\windows\VasoAnalyzer.iss) `
            -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`"" |
            Set-Content packaging\windows\VasoAnalyzer.iss

      - name: Build Windows installer
        shell: pwsh
        run: .\packaging\windows\build_installer.ps1

      - name: Smoke-test Windows exe
        shell: pwsh
        run: |
          $exe = "dist\VasoAnalyzer\VasoAnalyzer.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found at $exe" }
          Write-Host "==> Running smoke test..."
          $output = & $exe --smoke-test 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "all imports OK") { throw "Smoke test failed — expected output not found" }
          Write-Host "==> Smoke test passed"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packaging/windows/output/*.exe

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-Intel
          path: release-assets/

      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-AppleSilicon
          path: release-assets/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' > generated-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-body.md << 'HEADER'
          ## Downloads

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | `*-AppleSilicon.dmg` — M1/M2/M3/M4 Macs |
          | macOS (Intel) | `*-Intel.dmg` — older Intel-based Macs |
          | Windows | `.exe` — run the installer |

          **macOS note:** This is an unsigned build. On first launch, right-click the app → Open to bypass Gatekeeper.

          ---
          HEADER
          cat generated-notes.md >> release-body.md

          gh release create "${{ github.ref_name }}" \
            release-assets/* \
            --repo "${{ github.repository }}" \
            --title "VasoAnalyzer ${{ github.ref_name }}" \
            --notes-file release-body.md
