name: Build

# Triggered when you push a version tag, e.g.: git tag v3.0.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Inject version from tag
        run: |
          sed -i '' 's/^APP_VERSION = .*/APP_VERSION = "${{ github.ref_name }}"/' src/utils/config.py

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Build macOS DMG
        run: bash installer/macos/build_macos.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: installer/macos/output/*.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Inject version from tag
        shell: pwsh
        run: |
          (Get-Content src/utils/config.py) `
            -replace '^APP_VERSION = .*', "APP_VERSION = `"${{ github.ref_name }}`"" |
            Set-Content src/utils/config.py

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Inject version into Inno Setup script
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content installer\windows\VasoAnalyzer.iss) `
            -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`"" |
            Set-Content installer\windows\VasoAnalyzer.iss

      - name: Build Windows installer
        shell: pwsh
        run: .\installer\windows\build_installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/output/*.exe

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' > generated-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-body.md << 'HEADER'
          ## Downloads

          | Platform | File |
          |----------|------|
          | macOS | `.dmg` — open it and drag VasoAnalyzer to Applications |
          | Windows | `.exe` — run the installer |

          **macOS note:** This is an unsigned build. On first launch, right-click the app → Open to bypass Gatekeeper. This is normal for open-source apps without an Apple Developer account.

          Runs natively on Apple Silicon (M1/M2/M3/M4). Intel Macs are supported via Rosetta 2.

          ---
          HEADER
          cat generated-notes.md >> release-body.md

          gh release create "${{ github.ref_name }}" \
            release-assets/* \
            --repo "${{ github.repository }}" \
            --title "VasoAnalyzer ${{ github.ref_name }}" \
            --notes-file release-body.md
